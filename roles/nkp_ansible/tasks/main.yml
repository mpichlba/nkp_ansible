---
# tasks file for nkp_deploy
- name: Check if NKP rock image is present
  nutanix.ncp.ntnx_images_info:
    nutanix_host: "{{ NUTANIX_ENDPOINT }}"
    nutanix_username: "{{ NUTANIX_USER }}"
    nutanix_password: "{{ NUTANIX_PASSWORD }}"
    validate_certs: false
    filter:
      name: "{{ NUTANIX_MACHINE_TEMPLATE_IMAGE_NAME }}"
  register: image_result


- name: Debug image check output
  debug:
    var: image_result


- name: Upload NKP image to PC if not present
  nutanix.ncp.ntnx_images:
    state: "present"
    nutanix_host: "{{ NUTANIX_ENDPOINT }}"
    nutanix_username: "{{ NUTANIX_USER }}"
    nutanix_password: "{{ NUTANIX_PASSWORD }}"
    validate_certs: false
    source_uri: "{{ NODE_IMAGE_URL }}"
    clusters:
      - name: "{{ NUTANIX_PRISM_ELEMENT_CLUSTER_NAME }}"
    name: "{{ NUTANIX_MACHINE_TEMPLATE_IMAGE_NAME }}"
    desc: "Image uploaded for NKP deploy by Ansible"
    image_type: "DISK_IMAGE"
    wait: true
  when: image_result.response.metadata.length == 0


- name: Check if VM "nkp_bastion" exists
  nutanix.ncp.ntnx_vms_info:
    nutanix_host: "{{ NUTANIX_ENDPOINT }}"
    nutanix_username: "{{ NUTANIX_USER }}"
    nutanix_password: "{{ NUTANIX_PASSWORD }}"
    validate_certs: false
    filter:
      vm_name: "nkp_bastion"
    kind: vm
  register: bootvm_present

- name: Extract Bastion VM IP address from existing VM
  set_fact:
    bootvm_ip: "{{ bootvm_present.response.entities[0].spec.resources.nic_list[0].ip_endpoint_list[0].ip }}"
    bootvm_created: false
  when: bootvm_present.response.metadata.length > 0

- name: Debug existing Bastion VM IP address
  debug:
    var: bootvm_ip
  when: bootvm_present.response.metadata.length > 0 

- name: Template the cloud-init configuration file
  ansible.builtin.template:
    src: templates/cloud_init.yml.j2
    dest: ./cloud_init.yml


- name: Create Bastion VM if not present
  nutanix.ncp.ntnx_vms:
    state: present
    name: "nkp_bastion"
    timezone: "UTC"
    nutanix_host: "{{ NUTANIX_ENDPOINT }}"
    nutanix_username: "{{ NUTANIX_USER }}"
    nutanix_password: "{{ NUTANIX_PASSWORD }}"
    validate_certs: false
    cluster:
      name: "{{ NUTANIX_PRISM_ELEMENT_CLUSTER_NAME }}"
    networks:
      - is_connected: true
        subnet:
          name: "{{ NUTANIX_SUBNET_NAME }}"
    disks:
      - type: "DISK"
        size_gb: 20
        clone_image:
          name: "{{ NUTANIX_MACHINE_TEMPLATE_IMAGE_NAME }}"
        bus: "SCSI"
    vcpus: 4
    cores_per_vcpu: 1
    memory_gb: 8
    guest_customization:
      type: "cloud_init"
      script_path: "./cloud_init.yml"
      is_overridable: true
  register: bootvm_out
  when: bootvm_present.response.metadata.length == 0

- name: Extract Bastion VM IP address from newly created VM
  set_fact:
    bootvm_ip: "{{ bootvm_out.response.spec.resources.nic_list[0].ip_endpoint_list[0].ip }}"
    bootvm_created: true
  when: bootvm_out.changed

- name: Add Bastion VM to in-memory inventory
  ansible.builtin.add_host:
    name: nkp_bastion
    groups: nkp_boot
    ansible_host: "{{ bootvm_ip }}"
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    ansible_user: nutanix

- name: Refresh inventory
  ansible.builtin.meta: refresh_inventory

# NKP Deploy - Second Module
- name: Wait for newly created Bastion VM to be ready
  ansible.builtin.pause:
    seconds: 30
  when: bootvm_created | default(false)

- name: Download and extract NKP binary
  ansible.builtin.shell: "curl -fsSL '{{ NKP_LINUX_URL }}' | tar xz -C /usr/local/bin -- nkp"
  become: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['nkp_boot'] }}"
  register: nkp_download_result
  changed_when: "'nkp' in nkp_download_result.stdout or nkp_download_result.rc == 0"

- name: Verify NKP binary installation
  ansible.builtin.command: nkp version
  register: nkp_version_output
  ignore_errors: true
  changed_when: false
  delegate_to: "{{ item }}"
  loop: "{{ groups['nkp_boot'] }}"
  failed_when: nkp_version_output.rc != 0

- name: Debug NKP version
  debug:
    msg: "NKP version: {{ nkp_version_output.results[0].stdout }}"
  when: nkp_version_output.results[0].rc == 0


- name: Check if NKP cluster already exists
  ansible.builtin.shell: |
    nkp get clusters | grep -q "{{ CLUSTER_NAME }}"
  delegate_to: "{{ groups['nkp_boot'][0] }}"
  register: cluster_exists
  changed_when: false
  ignore_errors: true
  failed_when: false

- name: Create NKP cluster
  ansible.builtin.shell: |
    export NUTANIX_USER={{ NUTANIX_USER }}
    export NUTANIX_PASSWORD={{ NUTANIX_PASSWORD }}
    nkp create cluster nutanix -c {{ CLUSTER_NAME }} \
      --endpoint https://{{ NUTANIX_ENDPOINT }}:{{ NUTANIX_PORT }} \
      --insecure \
      --kubernetes-service-load-balancer-ip-range {{ LB_IP_RANGE }} \
      --control-plane-endpoint-ip {{ CONTROL_PLANE_ENDPOINT_IP }} \
      --control-plane-vm-image {{ NUTANIX_MACHINE_TEMPLATE_IMAGE_NAME }} \
      --control-plane-prism-element-cluster {{ NUTANIX_PRISM_ELEMENT_CLUSTER_NAME }} \
      --control-plane-subnets {{ NUTANIX_SUBNET_NAME }} \
      --control-plane-replicas 3 \
      --worker-vm-image {{ NUTANIX_MACHINE_TEMPLATE_IMAGE_NAME }} \
      --worker-prism-element-cluster {{ NUTANIX_PRISM_ELEMENT_CLUSTER_NAME }} \
      --worker-subnets {{ NUTANIX_SUBNET_NAME }} \
      --worker-replicas 3 \
      --csi-storage-container {{ NUTANIX_STORAGE_CONTAINER_NAME }} \
      --registry-url "https://registry-1.docker.io" \
      --registry-username {{ DOCKER_USERNAME }} \
      --registry-password {{ DOCKER_PASSWORD }} \
      --self-managed
  register: nkp_output
  delegate_to: "{{ groups['nkp_boot'][0] }}"
  when: cluster_exists.rc != 0

- name: Display NKP cluster creation output
  debug:
    var: nkp_output
  delegate_to: "{{ groups['nkp_boot'][0] }}"
  when: nkp_output is defined

- name: Retrieve NKP dashboard information
  ansible.builtin.command: "nkp get dashboard --kubeconfig=./{{ CLUSTER_NAME }}.conf"
  register: dashboard_output
  changed_when: false
  delegate_to: "{{ groups['nkp_boot'][0] }}"

- name: Display NKP dashboard access information
  ansible.builtin.debug:
    msg: |
      NKP Cluster Dashboard Access Information:
      {{ dashboard_output.stdout_lines | join('\n') }}
  when: dashboard_output.rc == 0